<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESIC Fest — Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
background:#05050f;
font-family:'DM Sans',sans-serif;
color:white;
margin:0;
}

.wrapper{
max-width:420px;
margin:auto;
padding:20px;
}

/* PARTICIPANT COUNTER */

.counter-box{
text-align:center;
background:#111126;
border:1px solid #2b2b5c;
border-radius:14px;
padding:16px;
margin-bottom:24px;
}

.counter-title{
font-size:12px;
color:#8b8bb5;
letter-spacing:1px;
text-transform:uppercase;
}

.counter-number{
font-family:'Syne',sans-serif;
font-size:32px;
font-weight:800;
color:#a78bfa;
}

/* HEADER */

.fest-header{
text-align:center;
margin-bottom:25px;
}

.fest-title{
font-family:'Syne',sans-serif;
font-size:30px;
font-weight:800;
}

.fest-sub{
color:#8a8aab;
font-size:14px;
}

/* FORM */

.form-card{
background:#0f0f1f;
border:1px solid #222248;
border-radius:20px;
padding:25px;
}

.field{
margin-bottom:16px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #2b2b5c;
background:#161628;
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#7c3aed;
color:white;
font-weight:700;
font-family:'Syne';
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#8b5cf6;
}

/* PAYMENT */

.qr{
background:white;
padding:10px;
display:inline-block;
margin:20px auto;
border-radius:10px;
}

.center{text-align:center}

.success{
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="counter-box">
<div class="counter-title">Registered Participants</div>
<div class="counter-number" id="participantCount">Loading...</div>
</div>

<div class="fest-header">
<div class="fest-title">ESIC Fest 2025</div>
<div class="fest-sub">Engineering Science & Innovation Conclave</div>
</div>

<div id="formSection" class="form-card">

<div class="field">
<input id="college" placeholder="College Name">
</div>

<div class="field">
<input id="batch" placeholder="Batch / Year">
</div>

<div class="field">
<input id="phone" type="tel" inputmode="numeric" maxlength="10" placeholder="Phone Number">
</div>

<div class="field">
<input id="email" type="email" placeholder="Email Address">
</div>

<button onclick="startPayment()">Continue to Payment</button>

</div>

<div id="paymentSection" class="form-card" style="display:none">

<div class="center">

<h3>Scan & Pay ₹499</h3>

<div class="qr">
<div id="qrcode"></div>
</div>

<p>UPI ID<br><b>8367464652-4@ybl</b></p>

</div>

<div class="field">
<input id="ref" placeholder="Enter Payment Reference Number">
</div>

<button onclick="completeRegistration()">Complete Registration</button>

</div>

<div id="successSection" class="success" style="display:none">

<h2>🎉 Registration Successful</h2>

<p id="receipt"></p>

</div>

</div>

<script>

const CONFIG = {
amount:499,
upiId:'8367464652-4@ybl',
sheetURL:'https://script.google.com/macros/s/AKfycbwax-HXq4Dcrj9lppYsmXHd6_b9RvDFjN_x9pkpjbSabomPKeLPnlMOEtj_SIRpXlzo/exec'
}

emailjs.init("7wfdFgIiAPrhoFASC")

let formData={}

/* PARTICIPANT COUNTER */

async function loadParticipants(){

try{

let r=await fetch(CONFIG.sheetURL)
let d=await r.json()

document.getElementById("participantCount").innerText=d.participants

}catch{

document.getElementById("participantCount").innerText="0"

}

}

loadParticipants()

/* START PAYMENT */

function startPayment(){

let college=document.getElementById("college").value.trim()
let batch=document.getElementById("batch").value.trim()
let phone=document.getElementById("phone").value.trim()
let email=document.getElementById("email").value.trim()

if(!college||!batch||!phone||!email){

alert("Please fill all fields")
return

}

if(!/^[0-9]{10}$/.test(phone)){

alert("Enter valid 10 digit phone number")
return

}

formData={college,batch,phone,email}

document.getElementById("formSection").style.display="none"
document.getElementById("paymentSection").style.display="block"

let upi=`upi://pay?pa=${CONFIG.upiId}&pn=ESICFest&am=${CONFIG.amount}&cu=INR`

new QRCode(document.getElementById("qrcode"),{
text:upi,
width:180,
height:180
})

}

/* COMPLETE */

function completeRegistration(){

let ref=document.getElementById("ref").value.trim()

if(ref.length<6){

alert("Enter payment reference number")
return

}

saveToSheet(ref)

}

/* SAVE */

function saveToSheet(ref){

let payload={
college:formData.college,
batch:formData.batch,
phone:formData.phone,
email:formData.email,
reference:ref
}

fetch(CONFIG.sheetURL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)
})
.then(r=>r.json())
.then(data=>{

if(data.status==="duplicate"){

alert("This phone or email already registered")
return

}

finishSuccess(ref)

})
.catch(()=>finishSuccess(ref))

}

/* SUCCESS */

function finishSuccess(ref){

document.getElementById("paymentSection").style.display="none"
document.getElementById("successSection").style.display="block"

document.getElementById("receipt").innerHTML=

`
College: ${formData.college}<br>
Batch: ${formData.batch}<br>
Phone: ${formData.phone}<br>
Reference: ${ref}
`

}

</script>

</body>
</html>
